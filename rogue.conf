# ============================
# rogue.conf — hostapd-wpe Full Configuration (Commented)
# For: WPA2-Enterprise Rogue AP
# ============================

# --- Interface ---
# Network interface to be used for the AP
interface=wlan0

# Driver type (nl80211 is standard for modern Linux WiFi)
driver=nl80211

# Two-letter country code (US in this example)
country_code=US

# Syslog logging (-1 means disabled)
logger_syslog=-1

# Syslog log level (2 is informational)
logger_syslog_level=2

# Stdout logging (-1 means disabled)
logger_stdout=-1

# Stdout log level (2 is informational)
logger_stdout_level=2

# --- AP Settings ---
# Name of the WiFi network (SSID) to broadcast
ssid=TargetCorpWiFi

# Wireless hardware mode (g = 2.4 GHz 802.11g)
hw_mode=g

# WiFi channel (must match client expectations)
channel=6

# Enable 802.11n high throughput mode
ieee80211n=1

# Enable WMM (Wireless Multimedia Extensions)
wmm_enabled=1

# Time between beacons (in ms)
beacon_int=100

# Delivery Traffic Indication Message (DTIM) period
dtim_period=2

# Maximum number of simultaneous clients (stations)
max_num_sta=255

# MAC address access control list (0 = disabled)
macaddr_acl=0

# Whether to broadcast the SSID (0 = broadcast)
ignore_broadcast_ssid=0

# --- Security ---
# Authentication algorithms allowed (3 = both Open and Shared)
auth_algs=3

# WPA version (2 = WPA2 only)
wpa=2

# WPA Key Management (WPA-EAP = Enterprise, i.e., 802.1X/EAP)
wpa_key_mgmt=WPA-EAP

# WPA encryption (CCMP = AES)
wpa_pairwise=CCMP

# RSN (Robust Security Network) encryption (CCMP = AES)
rsn_pairwise=CCMP

# Enable IEEE 802.1X authentication (required for WPA2-Enterprise)
ieee8021x=1

# Disable EAPOL key index workaround (0 = disabled)
eapol_key_index_workaround=0

# --- EAP Server ---
# Enable internal EAP server (1 = enabled)
eap_server=1

# Path to the EAP users file (defines test users)
eap_user_file=/root/rogue_lab/eap_users

# --- Certificates ---
# Path to the Certificate Authority certificate
ca_cert=/root/rogue_lab/certs/ca.pem

# Path to the server certificate
server_cert=/root/rogue_lab/certs/server.pem

# Path to the server private key
private_key=/root/rogue_lab/certs/server.key

# Password for the private key (empty = no password)
private_key_passwd=

# Path to Diffie-Hellman parameters file
dh_file=/root/rogue_lab/certs/dh

# --- EAP-FAST ---
# Authority Identity for EAP-FAST (hex string)
eap_fast_a_id=101112131415161718191a1b1c1d1e1f

# Authority Identity Information (human-readable)
eap_fast_a_id_info=rogue-ap

# Provisioning mode for EAP-FAST (3 = anonymous, authenticated, and unauthenticated provisioning allowed)
eap_fast_prov=3

# PAC (Protected Access Credential) key lifetime in seconds (1 week)
pac_key_lifetime=604800

# PAC key refresh time in seconds (1 day)
pac_key_refresh_time=86400
                                       
